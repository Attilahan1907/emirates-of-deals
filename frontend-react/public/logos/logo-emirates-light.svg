<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <!-- Glassmorphism Background for the Badge -->
    <linearGradient id="bg-grad-glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.25" />
    </linearGradient>
    
    <!-- Skyscraper & Text Gradient -->
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Skyscraper Shadow Gradient -->
    <linearGradient id="sky-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#164e63;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. The Badge Shape -->
  <path d="M200,20 L360,120 L360,450 Q360,500 310,500 L90,500 Q40,500 40,450 L40,120 Z" 
        fill="url(#bg-grad-glass)" 
        stroke="currentColor" 
        stroke-width="1.5" 
        stroke-opacity="0.15" />

  <!-- 2. The Detailed Skyscraper Complex - Slightly adjusted -->
  <g transform="translate(200, 280)" filter="url(#glow)">
    <path d="M-20,0 L-20,-210 L0,-240 L20,-210 L20,0 Z" fill="url(#primary-gradient)" />
    <path d="M0,-240 L20,-210 L20,0 L0,0 Z" fill="url(#sky-shadow)" opacity="0.4" />
    <path d="M-2,-237 L0,-240 L2,-237 L2,0 L-2,0 Z" fill="white" opacity="0.5" />

    <path d="M-50,0 L-50,-150 L-35,-165 L-20,-150 L-20,0 Z" fill="url(#primary-gradient)" opacity="0.9" />
    <path d="M-35,-165 L-20,-150 L-20,0 L-35,0 Z" fill="url(#sky-shadow)" opacity="0.4" />

    <path d="M20,0 L20,-140 L33,-155 L45,-140 L45,0 Z" fill="url(#primary-gradient)" opacity="0.9" />
    <path d="M33,-155 L45,-140 L45,0 L33,0 Z" fill="url(#sky-shadow)" opacity="0.4" />

    <path d="M-75,0 L-75,-90 L-62,-105 L-50,-90 L-50,0 Z" fill="url(#primary-gradient)" opacity="0.7" />
    <path d="M50,0 L50,-90 L62,-105 L75,-90 L75,0 Z" fill="url(#primary-gradient)" opacity="0.7" />

    <g transform="translate(0, -250)">
      <circle cx="0" cy="0" r="18" fill="url(#primary-gradient)" />
      <rect x="-2" y="-45" width="4" height="25" fill="url(#primary-gradient)" />
    </g>
  </g>

  <!-- 3. Typography - Moved DOWN as requested -->
  <g transform="translate(200, 360)" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="900">
    <!-- EMIRATES -->
    <text x="0" y="0" font-size="42" letter-spacing="3" style="text-transform: uppercase;" fill="url(#primary-gradient)">Emirates</text>
    
    <!-- OF -->
    <g transform="translate(0, 38)">
      <line x1="-120" y1="-10" x2="-40" y2="-10" stroke="currentColor" stroke-width="2" opacity="0.2" />
      <text x="0" y="0" font-size="24" font-weight="800" letter-spacing="2" fill="currentColor" opacity="0.8">OF</text>
      <line x1="40" y1="-10" x2="120" y2="-10" stroke="currentColor" stroke-width="2" opacity="0.2" />
    </g>
    
    <!-- DEALS -->
    <text x="0" y="105" font-size="72" letter-spacing="1" style="text-transform: uppercase;" fill="url(#primary-gradient)">Deals</text>
  </g>
</svg>
